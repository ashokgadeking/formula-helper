AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Formula Helper — serverless API and static web hosting

Globals:
  Function:
    Runtime: python3.12
    Timeout: 15
    MemorySize: 128

Resources:
  # ── DynamoDB ────────────────────────────────────────────────────────────────
  FormulaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: FormulaHelper
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # ── Lambda ──────────────────────────────────────────────────────────────────
  FormulaFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: lambda/
      Environment:
        Variables:
          TABLE_NAME: !Ref FormulaTable
          NTFY_TOPIC: bottle-expiry-1737
          RP_ID: d20oyc88hlibbe.cloudfront.net
          RP_ORIGIN: https://d20oyc88hlibbe.cloudfront.net
          PI_API_KEY: XC3DYLpw4SE0VUb4zvfyLypu3b9eQhnntqkGG_amsAw
          VAPID_PRIVATE_KEY: 19VUF_AUN7A8Xi6C1l1Mc0hmKgMRJlh-p4OcRiDx69g
          VAPID_PUBLIC_KEY: BPK2aX8BTuiJRuhJZ71FIHEidNMhT_fdQE2joqwm6S2TVoE1e_20e3XXstF9Cbkbbbja-sPmZsEeBqoBJ0PJ2s0
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FormulaTable
      Events:
        GetState:
          Type: HttpApi
          Properties:
            Path: /api/state
            Method: GET
            ApiId: !Ref FormulaApi
        PostStart:
          Type: HttpApi
          Properties:
            Path: /api/start
            Method: POST
            ApiId: !Ref FormulaApi
        PutLog:
          Type: HttpApi
          Properties:
            Path: /api/log/{sk}
            Method: PUT
            ApiId: !Ref FormulaApi
        DeleteLog:
          Type: HttpApi
          Properties:
            Path: /api/log/{sk}
            Method: DELETE
            ApiId: !Ref FormulaApi
        ResetTimer:
          Type: HttpApi
          Properties:
            Path: /api/reset-timer
            Method: POST
            ApiId: !Ref FormulaApi
        PostSettings:
          Type: HttpApi
          Properties:
            Path: /api/settings
            Method: POST
            ApiId: !Ref FormulaApi
        AuthStatus:
          Type: HttpApi
          Properties:
            Path: /api/auth/status
            Method: GET
            ApiId: !Ref FormulaApi
        AuthRegisterOptions:
          Type: HttpApi
          Properties:
            Path: /api/auth/register-options
            Method: POST
            ApiId: !Ref FormulaApi
        AuthRegisterVerify:
          Type: HttpApi
          Properties:
            Path: /api/auth/register-verify
            Method: POST
            ApiId: !Ref FormulaApi
        AuthLoginOptions:
          Type: HttpApi
          Properties:
            Path: /api/auth/login-options
            Method: POST
            ApiId: !Ref FormulaApi
        AuthLoginVerify:
          Type: HttpApi
          Properties:
            Path: /api/auth/login-verify
            Method: POST
            ApiId: !Ref FormulaApi
        PushVapidKey:
          Type: HttpApi
          Properties:
            Path: /api/push/vapid-key
            Method: GET
            ApiId: !Ref FormulaApi
        PushSubscribe:
          Type: HttpApi
          Properties:
            Path: /api/push/subscribe
            Method: POST
            ApiId: !Ref FormulaApi
        PushTest:
          Type: HttpApi
          Properties:
            Path: /api/push/test
            Method: POST
            ApiId: !Ref FormulaApi
        PushUnsubscribe:
          Type: HttpApi
          Properties:
            Path: /api/push/unsubscribe
            Method: POST
            ApiId: !Ref FormulaApi

  # ── HTTP API ────────────────────────────────────────────────────────────────
  FormulaApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - "https://d20oyc88hlibbe.cloudfront.net"
          - "http://formula-helper-web.s3-website-us-east-1.amazonaws.com"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
        AllowCredentials: true

  # ── S3 Static Site ─────────────────────────────────────────────────────────
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: formula-helper-web
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${WebBucket.Arn}/*"

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${FormulaApi}.execute-api.${AWS::Region}.amazonaws.com"
  WebUrl:
    Description: S3 static website URL
    Value: !GetAtt WebBucket.WebsiteURL
  TableName:
    Description: DynamoDB table name
    Value: !Ref FormulaTable
