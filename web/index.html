<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-180.png">
<title>Formula Helper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
:root{
  --bg:#08080f;--bg2:#0e0e1a;--card:#141422;--card2:#1a1a2e;
  --border:rgba(255,255,255,.06);--border-light:rgba(255,255,255,.1);
  --white:#ebebf5;--dim:#6e6e87;--dim2:#4a4a62;
  --green:#44d66e;--green-bg:rgba(68,210,110,.1);--green-border:rgba(68,210,110,.2);
  --blue:#5aaaff;--blue-bg:rgba(90,170,255,.08);--blue-border:rgba(90,170,255,.15);
  --yellow:#ffc837;--yellow-bg:rgba(255,200,55,.08);--yellow-border:rgba(255,200,55,.15);
  --red:#ff4b4b;--red-bg:rgba(255,75,75,.08);--red-border:rgba(255,75,75,.15);
  --purple:#b478ff;--purple-bg:rgba(180,120,255,.08);--purple-border:rgba(180,120,255,.15);
  --radius:14px;--radius-sm:10px;
  --font:'Outfit',system-ui,-apple-system,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--white);
  font-family:var(--font);touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;overflow:hidden;
  font-feature-settings:'tnum';letter-spacing:-.01em}

/* ── Screens & transitions ──────────────────────── */
.screen{display:none;flex-direction:column;height:100%;width:100%;
  position:absolute;top:0;left:0;opacity:0;
  transition:opacity .2s ease}
.screen.active{display:flex;opacity:1}
button{border:none;cursor:pointer;font-family:var(--font);
  -webkit-tap-highlight-color:transparent;
  transition:transform .1s ease,filter .1s ease}
button:active{transform:scale(.96);filter:brightness(.85)}

/* ── Main screen ────────────────────────────────── */
.banner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;transition:background .4s ease;
  background:radial-gradient(ellipse at 50% 40%,rgba(68,210,110,.03) 0%,transparent 70%)}
.banner.expired{background:radial-gradient(ellipse at 50% 40%,rgba(255,75,75,.08) 0%,rgba(80,10,10,.4) 100%)}
.banner-sub{font-size:.85rem;color:var(--dim);margin-bottom:10px;
  letter-spacing:2.5px;font-weight:500;text-transform:uppercase}
.banner.expired .banner-sub{color:rgba(255,160,160,.8)}
.banner-time{font-size:4.2rem;font-weight:700;color:var(--green);
  letter-spacing:-2px;line-height:1}
.banner.expired .banner-time{font-size:3.5rem;color:var(--red);letter-spacing:0}
.countdown-corner{position:absolute;top:16px;right:20px;text-align:center}
.countdown-val{font-size:1.5rem;font-weight:600;letter-spacing:-.5px}
.countdown-label{font-size:.55rem;color:var(--dim);letter-spacing:1.5px;
  text-transform:uppercase;margin-top:2px;font-weight:500}
.gear{position:absolute;top:14px;left:14px;width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--dim2);font-size:1.4rem;border-radius:var(--radius-sm);
  transition:color .2s,background .2s}
.gear:active{color:var(--dim);background:rgba(255,255,255,.05)}

.btn-grid{display:grid;grid-template-columns:repeat(6,1fr);flex-shrink:0;
  border-top:1px solid var(--border-light);gap:1px;background:var(--border)}
.btn-grid button{height:84px;font-size:.9rem;font-weight:600;
  color:var(--white);background:var(--bg2);letter-spacing:.3px;grid-column:span 2}
.start-btn{background:rgba(68,210,110,.06)!important;color:var(--green)!important}
.start-btn .num{font-size:2.2rem;display:block;line-height:1;font-weight:700;letter-spacing:-1px}
.start-btn .ml-unit{font-size:.6rem;opacity:.4;display:block;font-weight:500;letter-spacing:.5px;margin-top:3px}
.log-btn{background:var(--yellow-bg)!important;color:var(--yellow)!important}
.samples-btn{background:var(--blue-bg)!important;color:var(--blue)!important}
.custom-btn{background:var(--purple-bg)!important;color:var(--purple)!important}
.pee-btn{grid-column:span 3!important;background:rgba(255,200,55,.06)!important;color:var(--yellow)!important}
.poo-btn{grid-column:span 3!important;background:rgba(200,121,65,.08)!important;color:#c87941!important}
.pee-btn .d-sub,.poo-btn .d-sub{font-size:.6rem;opacity:.5;display:block;font-weight:500;letter-spacing:.5px;margin-top:3px}

/* ── Log tabs ────────────────────────────────────── */
.log-tabs{display:flex;justify-content:center;gap:6px;padding:4px 16px 10px;flex-shrink:0}

/* ── Samples screen ─────────────────────────────── */
.samples-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.sample-card{display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg2);position:relative}
.sample-card:nth-child(even){background:var(--card)}
.sample-half{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%}
.sample-half+.sample-half{border-top:1px solid var(--border)}
.sample-lbl{font-size:.6rem;color:var(--dim);letter-spacing:2px;margin-bottom:6px;font-weight:500}
.sample-val{font-size:2.6rem;font-weight:700;line-height:1;letter-spacing:-1px}
.sample-unit{font-size:.8rem;color:var(--dim2);margin-top:6px;font-weight:500}
.water-val{color:var(--blue)}.powder-val{color:var(--green)}

/* ── Log screen ──────────────────────────────────── */
.log-header{display:flex;align-items:center;justify-content:center;
  padding:16px 16px 8px;gap:14px;flex-shrink:0;position:relative}
.log-nav-btn{width:36px;height:36px;border-radius:var(--radius-sm);
  background:var(--card);color:var(--dim);font-size:1rem;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border)}
.log-title{font-size:1.2rem;font-weight:700;text-align:center;padding:16px 0 8px;
  letter-spacing:-.3px}
.log-list{flex:1;overflow-y:auto;padding:6px 14px 14px;display:flex;flex-direction:column;gap:6px;
  -webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior:contain}
.log-empty{color:var(--dim);flex:1;display:flex;align-items:center;justify-content:center;
  font-size:.9rem;font-weight:400}
.log-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;display:flex;
  align-items:center;gap:14px;position:relative;border:1px solid var(--border);
  transition:background .15s}
.log-card:active{background:var(--card2)}
.log-num{font-size:.65rem;color:var(--dim2);width:40px;flex-shrink:0;text-align:center;
  font-weight:600;letter-spacing:.5px}
.log-info{flex:1;min-width:0}
.log-text{font-size:.9rem;color:var(--white);font-weight:500}
.log-leftover{font-size:.75rem;color:var(--yellow);margin-top:4px;font-weight:400}
.log-leftover.empty{color:var(--dim2);font-style:normal;font-weight:400}
.log-actions{display:flex;gap:5px;flex-shrink:0}
.log-act{width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;
  justify-content:center;font-size:.8rem;color:var(--white);cursor:pointer;border:none}
.log-act.leftover-btn{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.log-act.edit-btn{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.log-act.del-btn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}

/* ── Log modal overlay ──────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:100;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border:1px solid var(--border-light);
  border-radius:18px;padding:28px 24px;width:min(88%,340px);
  display:flex;flex-direction:column;gap:18px;
  box-shadow:0 24px 80px rgba(0,0,0,.5)}
.modal-title{font-size:1rem;font-weight:600;text-align:center;color:var(--white);
  letter-spacing:-.2px}
.modal input{background:var(--bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);
  padding:14px 16px;font-size:.95rem;color:var(--white);width:100%;outline:none;
  font-family:var(--font);transition:border-color .2s}
.modal input:focus{border-color:var(--blue)}
input{-webkit-user-select:text;user-select:text}
.modal input::placeholder{color:var(--dim2)}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns button{padding:14px;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600}
.modal-cancel{background:var(--card2);color:var(--dim);border:1px solid var(--border)}
.modal-save{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}

/* ── Log FAB ────────────────────────────────────── */
.log-fab{position:absolute;bottom:80px;right:18px;width:50px;height:50px;
  border-radius:50%;background:var(--green-bg);color:var(--green);
  border:1px solid var(--green-border);font-size:1.6rem;line-height:1;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:10}
.log-fab:active{opacity:.8}

/* ── Trends screen ──────────────────────────────── */
.trends-title{font-size:1.2rem;font-weight:700;text-align:center;padding:18px 0 6px;
  letter-spacing:-.3px}
.trends-tabs{display:flex;justify-content:center;gap:6px;padding:8px 16px;flex-shrink:0}
.trends-tab{padding:8px 20px;border-radius:20px;font-size:.75rem;font-weight:600;
  background:var(--card);color:var(--dim);border:1px solid var(--border);
  letter-spacing:.5px}
.trends-tab.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
#weight-toggle-btn.active{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.trends-chart{flex:1;padding:8px 14px;position:relative;min-height:0;overflow:hidden}
.trends-chart canvas{position:absolute;top:0;left:14px;right:14px;bottom:8px;
  width:calc(100% - 28px)!important;height:calc(100% - 8px)!important}
.trends-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 14px;flex-shrink:0}
.trends-stat{background:var(--card);border-radius:var(--radius);padding:14px 10px;
  text-align:center;border:1px solid var(--border)}
.trends-stat-val{font-size:1.5rem;font-weight:700;color:var(--blue);letter-spacing:-.5px}
.trends-stat-lbl{font-size:.55rem;color:var(--dim);letter-spacing:1.5px;margin-top:4px;font-weight:500}

/* ── Calculator screen ───────────────────────────── */
.calc-body{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.calc-side{display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;background:var(--bg2)}
.calc-side.water{background:var(--card)}
.calc-side.powder{background:rgba(18,44,26,.6)}
.calc-side.powder.zero{background:var(--card)}
.calc-lbl{font-size:.65rem;color:var(--dim);letter-spacing:2px;margin-bottom:10px;font-weight:500}
.calc-val{font-size:5rem;font-weight:700;line-height:1;letter-spacing:-3px}
.calc-unit{font-size:1rem;color:var(--dim2);margin-top:10px;font-weight:500;letter-spacing:1px}
.calc-pm-row{display:grid;grid-template-columns:1fr 1fr;position:absolute;
  bottom:0;left:0;right:0;gap:1px;background:var(--border)}
.calc-pm-btn{height:56px;font-size:1.8rem;font-weight:600;cursor:pointer;border:none}
.calc-minus-btn{background:var(--red-bg);color:var(--red)}
.calc-plus-btn{background:var(--blue-bg);color:var(--blue)}

/* ── Settings screen ─────────────────────────────── */
.settings-title{font-size:1.2rem;font-weight:700;text-align:center;padding:24px 0;
  letter-spacing:-.3px}
.setting-row{display:flex;align-items:center;justify-content:center;gap:20px;padding:16px 0}
.setting-label{font-size:.7rem;color:var(--dim);text-align:center;letter-spacing:2px;font-weight:500}
.setting-val{font-size:2rem;font-weight:700;min-width:110px;text-align:center;letter-spacing:-.5px}
.setting-btn{width:50px;height:50px;border-radius:var(--radius-sm);
  font-size:1.4rem;font-weight:600;border:1px solid var(--border)}
.setting-plus{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.setting-minus{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}

/* ── Bottom bar (back / actions) ─────────────────── */
.bottom-bar{display:grid;flex-shrink:0;border-top:1px solid var(--border-light);
  gap:1px;background:var(--border)}
.bottom-bar.single{grid-template-columns:1fr}
.bottom-bar.split{grid-template-columns:1fr 1fr}
.bottom-bar button{height:64px;font-size:.9rem;font-weight:600;
  background:var(--bg2);color:var(--dim);letter-spacing:.3px}
.bottom-bar .start-timer-btn{background:rgba(68,210,110,.06);color:var(--green)}

/* ── Scrollbar ─────────────────────────────────── */
.log-list::-webkit-scrollbar{width:3px}
.log-list::-webkit-scrollbar-track{background:transparent}
.log-list::-webkit-scrollbar-thumb{background:var(--dim2);border-radius:3px}

/* ── Diaper toast ───────────────────────────────── */
.diaper-toast{position:absolute;top:16px;left:50%;transform:translateX(-50%);
  padding:10px 22px;border-radius:20px;font-size:.85rem;font-weight:600;
  letter-spacing:.3px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:50;
  white-space:nowrap}
.diaper-toast.show{opacity:1}

/* ── Progress bar ──────────────────────────────── */
.progress-track{position:absolute;top:0;left:0;right:0;height:5px;
  background:rgba(255,255,255,.04);overflow:hidden}
.progress-fill{height:100%;transition:width 1s linear,background-color 2s ease}

/* ── Backup indicator ──────────────────────────── */
.backup-indicator{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:.55rem;letter-spacing:.3px;line-height:1.3;text-align:center;font-weight:500}

/* ── Screensaver ──────────────────────────────── */
.screensaver{position:fixed;inset:0;background:#000;z-index:150;display:none;cursor:none}
.screensaver.active{display:block}
.ss-sprite{position:absolute;width:80px;height:auto;opacity:.6}
.ss-clock{position:absolute;font-size:2rem;font-weight:600;color:rgba(255,255,255,.08);
  font-family:var(--font);letter-spacing:-1px}

/* ── Auth overlay ──────────────────────────────── */
.auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.auth-overlay.hidden{display:none}
.auth-icon{font-size:3rem;opacity:.3}
.auth-title{font-size:1.3rem;font-weight:700;letter-spacing:-.3px}
.auth-sub{font-size:.8rem;color:var(--dim);text-align:center;max-width:260px;line-height:1.5}
.auth-btn{padding:16px 40px;border-radius:var(--radius);font-size:.95rem;font-weight:600;
  background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);
  cursor:pointer}
.auth-btn:active{transform:scale(.96)}
.auth-error{font-size:.75rem;color:var(--red);text-align:center;max-width:260px}
.auth-name-input{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius-sm);
  padding:14px 16px;font-size:.95rem;color:var(--white);width:220px;outline:none;
  font-family:var(--font);text-align:center}
.auth-name-input:focus{border-color:var(--blue)}
.auth-name-input::placeholder{color:var(--dim2)}
</style>
</head>
<body>

<!-- ══ SCREENSAVER ═══════════════════════════════ -->
<div class="screensaver" id="screensaver" onclick="exitScreensaver()">
  <img class="ss-sprite" id="ss-bottle" src="/bottle_vector.png" alt="">
  <img class="ss-sprite" id="ss-baby" src="/baby.png" alt="">
  <div class="ss-clock" id="ss-clock"></div>
</div>

<!-- ══ AUTH OVERLAY ══════════════════════════════ -->
<div class="auth-overlay hidden" id="auth-overlay">
  <div class="auth-icon">🍼</div>
  <div class="auth-title">Formula Helper</div>
  <div class="auth-sub" id="auth-sub">Checking authentication...</div>
  <input class="auth-name-input hidden" id="auth-name" type="text" placeholder="Your name" autocomplete="off">
  <button class="auth-btn hidden" id="auth-btn" onclick="handleAuth()">Sign In</button>
  <div class="hidden" id="auth-add-device" style="display:none;flex-direction:column;align-items:center;gap:12px;margin-top:8px">
    <div style="font-size:.7rem;color:var(--dim);letter-spacing:1px">OR ADD A NEW DEVICE</div>
    <input class="auth-name-input" id="auth-add-name" type="text" placeholder="Your name" autocomplete="off">
    <button class="auth-btn" onclick="addDeviceFromLogin()" style="background:var(--green-bg);color:var(--green);border-color:var(--green-border);font-size:.85rem;padding:12px 30px">Set Up Passkey</button>
  </div>
  <div class="auth-error hidden" id="auth-error"></div>
</div>

<!-- ══ MAIN ══════════════════════════════════════ -->
<div id="main-screen" class="screen active">
  <div class="banner" id="banner">
    <div class="gear" onclick="showScreen('settings')">&#9881;</div>
    <div class="countdown-corner" id="cd-corner" style="display:none">
      <div class="countdown-val" id="cd-val"></div>
      <div class="countdown-label">remaining</div>
    </div>
    <div class="banner-sub" id="banner-sub">NO BOTTLE MIXED YET</div>
    <div class="banner-time" id="banner-time" style="display:none"></div>
    <div class="progress-track" id="progress-track" style="display:none">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
  <div class="diaper-toast" id="main-diaper-toast"></div>
  <div class="btn-grid">
    <button class="start-btn" onclick="startTimer(90)"><span class="num">90</span><span class="ml-unit">ml</span></button>
    <button class="start-btn" onclick="startTimer(100)"><span class="num">100</span><span class="ml-unit">ml</span></button>
    <button class="start-btn" onclick="startTimer(120)"><span class="num">120</span><span class="ml-unit">ml</span></button>
    <button class="pee-btn" onclick="logDiaper('pee')">💛 Pee<span class="d-sub" id="pee-today-count"></span></button>
    <button class="poo-btn" onclick="logDiaper('poo')">💩 Poo<span class="d-sub" id="poo-today-count"></span></button>
    <button class="log-btn" onclick="showScreen('log')">Log</button>
    <button class="samples-btn" onclick="showScreen('samples')">Sample Sizes</button>
    <button class="custom-btn" onclick="showScreen('calculator')">Custom Amount</button>
  </div>
</div>

<!-- ══ SAMPLES ═══════════════════════════════════ -->
<div id="samples-screen" class="screen">
  <div class="samples-grid" id="samples-grid"></div>
  <div class="bottom-bar single"><button onclick="showScreen('main')">Back</button></div>
</div>

<!-- ══ DIAPER TRENDS ══════════════════════════════ -->
<div id="diaper-trends-screen" class="screen">
  <div class="trends-title">DIAPER TRENDS</div>
  <div class="trends-tabs">
    <button class="trends-tab active" onclick="setDiaperTrendRange('week',this)">Week</button>
    <button class="trends-tab" onclick="setDiaperTrendRange('month',this)">Month</button>
    <button class="trends-tab" onclick="setDiaperTrendRange('year',this)">Year</button>
    <button class="trends-tab" onclick="setDiaperTrendRange('all',this)">All</button>
  </div>
  <div class="trends-summary" id="diaper-trends-summary">
    <div class="trends-stat"><div class="trends-stat-val" id="dt-total">0</div><div class="trends-stat-lbl">TOTAL</div></div>
    <div class="trends-stat"><div class="trends-stat-val" id="dt-pee" style="color:var(--yellow)">0</div><div class="trends-stat-lbl">💛 PEE</div></div>
    <div class="trends-stat"><div class="trends-stat-val" id="dt-poo" style="color:#c87941">0</div><div class="trends-stat-lbl">💩 POO</div></div>
  </div>
  <div class="trends-chart"><canvas id="diaper-trends-canvas"></canvas></div>
  <div class="bottom-bar single">
    <button onclick="showScreen('diaper-log')">Back</button>
  </div>
</div>

<!-- ══ LOG ════════════════════════════════════════ -->
<div id="log-screen" class="screen">
  <div class="log-header">
    <button id="log-prev" class="log-nav-btn" onclick="logNav(-1)">&lt;</button>
    <div style="text-align:center">
      <div class="log-title" id="log-date-label" style="padding:0">Today</div>
      <div id="log-count" style="font-size:.65rem;color:var(--dim);font-weight:500;letter-spacing:.5px"></div>
    </div>
    <button id="log-next" class="log-nav-btn" onclick="logNav(1)">&gt;</button>
    <div id="backup-status" class="backup-indicator"></div>
  </div>
  <div class="log-tabs">
    <button class="trends-tab active" onclick="setLogTab('formula',this)">Formula</button>
    <button class="trends-tab" onclick="setLogTab('diaper',this)">Diapers</button>
  </div>
  <div class="log-list" id="log-list"></div>
  <button class="log-fab" id="log-fab" onclick="openAddEntry()" title="Add entry manually">+</button>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
const API_BASE = '';
let state = {};
let calcWater = 90;
const POWDER_PER_60 = 8.3;
let trendRange = 'week';
let trendChart = null;
let weightData = [];       // [{date: 'YYYY-MM-DD', lbs: float}] from state
let showWeight = false;    // toggle for weight overlay

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
  location.hash = name === 'main' ? '' : name;
  if (name === 'main') pollState();
  if (name === 'log') { _initLogViewDate(); updateLog(); }
  if (name === 'trends') { pollState().then(() => updateTrends()); }
  if (name === 'diaper-trends') updateDiaperTrends();
}

function pad2(n) { return String(n).padStart(2, '0'); }

function lerpRgb(c1, c2, t) {
  return [
    Math.round(c1[0] + (c2[0] - c1[0]) * t),
    Math.round(c1[1] + (c2[1] - c1[1]) * t),
    Math.round(c1[2] + (c2[2] - c1[2]) * t)
  ];
}

function progressColor(frac) {
  // green → yellow → orange → red as frac goes 1→0
  const green = [68,210,110], yellow = [255,200,55], orange = [255,140,30], red = [255,75,75];
  let c;
  if (frac > 0.5) { c = lerpRgb(yellow, green, (frac - 0.5) * 2); }
  else if (frac > 0.15) { c = lerpRgb(orange, yellow, (frac - 0.15) / 0.35); }
  else { c = lerpRgb(red, orange, frac / 0.15); }
  return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')';
}

function updateMain() {
  const banner = document.getElementById('banner');
  const sub = document.getElementById('banner-sub');
  const time_el = document.getElementById('banner-time');
  const cdCorner = document.getElementById('cd-corner');
  const cdVal = document.getElementById('cd-val');
  const pTrack = document.getElementById('progress-track');
  const pFill = document.getElementById('progress-fill');
  const total = (state.settings && state.settings.countdown_secs) || 3900;

  if (!state.mixed_at_str) {
    banner.classList.remove('expired');
    banner.style.background = '';
    sub.textContent = 'NO BOTTLE MIXED YET';
    sub.style.color = '';
    time_el.style.display = 'none';
    cdCorner.style.display = 'none';
    pTrack.style.display = 'none';
    return;
  }

  const mlStr = state.mixed_ml ? state.mixed_ml + 'ml ' : '';

  if (state.expired) {
    banner.classList.add('expired');
    sub.textContent = mlStr + 'MIXED AT ' + state.mixed_at_str;
    time_el.textContent = 'EXPIRED';
    time_el.style.display = '';
    time_el.style.color = 'var(--red)';
    time_el.style.fontSize = '3.5rem';
    cdCorner.style.display = 'none';
    pTrack.style.display = '';
    pFill.style.width = '100%';
    pFill.style.backgroundColor = 'var(--red)';
  } else {
    banner.classList.remove('expired');
    banner.style.background = '';
    sub.textContent = mlStr + 'MIXED AT';
    sub.style.color = '';
    time_el.textContent = state.mixed_at_str;
    time_el.style.display = '';
    time_el.style.color = 'var(--green)';
    time_el.style.fontSize = '4rem';

    if (state.remaining_secs > 0) {
      const m = Math.floor(state.remaining_secs / 60);
      const s = Math.floor(state.remaining_secs % 60);
      const frac = Math.min(1, state.remaining_secs / total);
      const color = progressColor(frac);
      cdVal.textContent = pad2(m) + ':' + pad2(s);
      cdVal.style.color = color;
      cdCorner.style.display = '';
      pTrack.style.display = '';
      pFill.style.width = (frac * 100) + '%';
      pFill.style.backgroundColor = color;
    } else {
      cdCorner.style.display = 'none';
      pTrack.style.display = 'none';
    }
  }
}

function updateSamples() {
  const grid = document.getElementById('samples-grid');
  if (!state.combos || grid.children.length) return;
  state.combos.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'sample-card';
    card.innerHTML =
      '<div class="sample-half"><div class="sample-lbl">WATER</div>' +
      '<div class="sample-val water-val">' + c[0] + '</div>' +
      '<div class="sample-unit">ml</div></div>' +
      '<div class="sample-half"><div class="sample-lbl">POWDER</div>' +
      '<div class="sample-val powder-val">' + c[1].toFixed(1) + '</div>' +
      '<div class="sample-unit">g</div></div>';
    grid.appendChild(card);
  });
}

let modalMode = '';  // 'edit' or 'leftover'
let modalSk = '';
let modalEntry = null;
let logViewDate = '';
let logActiveTab = 'formula'; // 'formula' or 'diaper'

function _initLogViewDate() {
  if (logActiveTab === 'formula') {
    const dates = getLogDates();
    logViewDate = dates.length ? dates[dates.length - 1] : localDateStr(new Date());
  } else {
    const dates = _getDiaperLogDates();
    logViewDate = dates.length ? dates[dates.length - 1] : localDateStr(new Date());
  }
}

function _getDiaperLogDates() {
  const s = new Set();
  diaperLog.forEach(e => { const d = (e.date || '').split(' ')[0]; if (d) s.add(d); });
  return [...s].sort();
}

function setLogTab(tab, btn) {
  logActiveTab = tab;
  document.querySelectorAll('.log-tabs .trends-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('log-fab').style.display = tab === 'formula' ? '' : 'none';
  _initLogViewDate();
  updateLog();
}

function goLogTrends() {
  showScreen(logActiveTab === 'formula' ? 'trends' : 'diaper-trends');
}

function entryText(e) { return typeof e === 'string' ? e : (e.text || ''); }
function entryLeftover(e) { return typeof e === 'object' ? (e.leftover || '') : ''; }
function entryDate(e) {
  if (typeof e === 'object' && e.date) return e.date.split(' ')[0];
  return '';
}

function getLogDates() {
  if (!state.mix_log) return [];
  const s = new Set();
  state.mix_log.forEach(e => { const d = entryDate(e); if (d) s.add(d); });
  return [...s].sort();
}

function localDateStr(dt) {
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function formatDateLabel(d) {
  const today = localDateStr(new Date());
  if (d === today) return 'Today';
  const y = new Date(Date.now() - 86400000);
  if (d === localDateStr(y)) return 'Yesterday';
  if (!d) return 'Undated';
  const dt = new Date(d + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[dt.getMonth()] + ' ' + dt.getDate() + ', ' + dt.getFullYear();
}

function logNav(dir) {
  if (logActiveTab === 'diaper') {
    const dates = _getDiaperLogDates();
    const idx = dates.indexOf(logViewDate);
    if (dir < 0 && idx > 0) logViewDate = dates[idx - 1];
    else if (dir > 0 && idx < dates.length - 1) logViewDate = dates[idx + 1];
    updateLog();
    return;
  }
  const dates = getLogDates();
  const undated = state.mix_log && state.mix_log.some(e => !entryDate(e));
  const idx = dates.indexOf(logViewDate);
  if (dir < 0) {
    if (idx > 0) logViewDate = dates[idx - 1];
    else if (idx === 0 && undated) logViewDate = '';
  } else {
    if (logViewDate === '' && dates.length) logViewDate = dates[0];
    else if (idx >= 0 && idx < dates.length - 1) logViewDate = dates[idx + 1];
  }
  updateLog();
}

function updateLog() {
  if (logActiveTab === 'diaper') { _updateDiaperTab(); return; }

  const list = document.getElementById('log-list');
  list.innerHTML = '';

  // Date label
  document.getElementById('log-date-label').textContent = formatDateLabel(logViewDate);

  // Prev/next visibility
  const dates = getLogDates();
  const undated = state.mix_log && state.mix_log.some(e => !entryDate(e));
  const idx = dates.indexOf(logViewDate);
  const hasPrev = (idx > 0) || (idx === 0 && undated);
  const hasNext = (logViewDate === '' && dates.length > 0) || (idx >= 0 && idx < dates.length - 1);
  document.getElementById('log-prev').style.visibility = hasPrev ? 'visible' : 'hidden';
  document.getElementById('log-next').style.visibility = hasNext ? 'visible' : 'hidden';

  if (!state.mix_log || !state.mix_log.length) {
    list.innerHTML = '<div class="log-empty">No mixes recorded yet</div>';
    document.getElementById('log-count').textContent = '';
    return;
  }

  // Filter by date
  const filtered = [];
  state.mix_log.forEach((e) => {
    const d = entryDate(e);
    if (logViewDate && d === logViewDate) filtered.push(e);
    else if (!logViewDate && !d) filtered.push(e);
  });

  document.getElementById('log-count').textContent =
    filtered.length ? filtered.length + ' bottle' + (filtered.length !== 1 ? 's' : '') : '';

  if (!filtered.length) {
    list.innerHTML = '<div class="log-empty">No entries for this day</div>';
    return;
  }

  // Newest first
  for (let fi = filtered.length - 1; fi >= 0; fi--) {
    const e = filtered[fi];
    const sk = e.sk || '';
    const txt = entryText(e);
    const lo = entryLeftover(e);
    const card = document.createElement('div');
    card.className = 'log-card';

    const num = document.createElement('div');
    num.className = 'log-num';
    const byColor = {'Ashok':'rgba(90,170,255,.5)','Anu':'rgba(255,130,170,.5)','Pi':'rgba(68,210,110,.5)'}[e.created_by] || 'rgba(110,110,135,.5)';
    num.innerHTML = (fi + 1) + (e.created_by ? '<div style="font-size:.55rem;margin-top:2px;color:' + byColor + '">' + e.created_by + '</div>' : '');

    const info = document.createElement('div');
    info.className = 'log-info';
    const textDiv = document.createElement('div');
    textDiv.className = 'log-text';
    textDiv.textContent = txt;
    info.appendChild(textDiv);
    const loDiv = document.createElement('div');
    loDiv.className = 'log-leftover' + (lo ? '' : ' empty');
    loDiv.textContent = lo ? 'leftover: ' + lo : 'no leftover recorded';
    info.appendChild(loDiv);

    const eskQ = sk.replace(/'/g, "\\'");
    const actions = document.createElement('div');
    actions.className = 'log-actions';
    actions.innerHTML =
      '<button class="log-act leftover-btn" onclick="openLeftover(\''+eskQ+'\')" title="Add leftover">&#9874;</button>' +
      '<button class="log-act edit-btn" onclick="openEdit(\''+eskQ+'\')" title="Edit">&#9998;</button>' +
      '<button class="log-act del-btn" onclick="deleteEntry(\''+eskQ+'\')" title="Delete">&#10005;</button>';

    card.appendChild(num);
    card.appendChild(info);
    card.appendChild(actions);
    list.appendChild(card);
  }
}

function _findBySk(sk) {
  return state.mix_log ? state.mix_log.find(e => e.sk === sk) : null;
}

function _parseTime12to24(dateStr) {
  // "2026-03-19 02:30 PM" → "14:30"
  const m = dateStr.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if (!m) return '';
  let h = parseInt(m[1]);
  if (m[3].toUpperCase() === 'PM' && h !== 12) h += 12;
  if (m[3].toUpperCase() === 'AM' && h === 12) h = 0;
  return String(h).padStart(2,'0') + ':' + m[2];
}

function openEdit(sk) {
  modalMode = 'edit';
  modalSk = sk;
  const entry = _findBySk(sk);
  document.getElementById('modal-title').textContent = 'Edit Entry';
  document.getElementById('modal-single-field').style.display = 'none';
  document.getElementById('modal-edit-fields').style.display = 'flex';
  document.getElementById('modal-date-row').style.display = 'none';
  document.getElementById('modal-ml').value = entry ? entry.ml || '' : '';
  document.getElementById('modal-time').value = entry ? _parseTime12to24(entry.date || '') : '';
  document.getElementById('modal-overlay').classList.add('active');
  document.getElementById('modal-ml').focus();
}

function openAddEntry() {
  modalMode = 'add';
  modalSk = '';
  const now = new Date();
  document.getElementById('modal-title').textContent = 'Add Entry';
  document.getElementById('modal-single-field').style.display = 'none';
  document.getElementById('modal-edit-fields').style.display = 'flex';
  document.getElementById('modal-date-row').style.display = 'flex';
  document.getElementById('modal-ml').value = '';
  document.getElementById('modal-time').value =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  // Default date to the currently viewed log date (or today)
  const d = logViewDate || localDateStr(now);
  document.getElementById('modal-date').value = d;
  document.getElementById('modal-overlay').classList.add('active');
  document.getElementById('modal-ml').focus();
}

function openLeftover(sk) {
  modalMode = 'leftover';
  modalSk = sk;
  const entry = _findBySk(sk);
  document.getElementById('modal-title').textContent = 'Add Leftover';
  document.getElementById('modal-single-field').style.display = '';
  document.getElementById('modal-edit-fields').style.display = 'none';
  document.getElementById('modal-input').value = entry ? entryLeftover(entry) : '';
  document.getElementById('modal-input').placeholder = 'e.g. 20ml remaining';
  document.getElementById('modal-overlay').classList.add('active');
  document.getElementById('modal-input').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function _time24to12str(time24) {
  if (!time24) return '';
  const [h, m] = time24.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return String(h12).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ' ' + ampm;
}

async function saveModal() {
  let url, method, body;
  if (modalMode === 'add') {
    const ml = parseInt(document.getElementById('modal-ml').value) || 0;
    if (!ml) return;
    const timeStr = _time24to12str(document.getElementById('modal-time').value);
    const dateVal = document.getElementById('modal-date').value; // "YYYY-MM-DD"
    const dateStr = dateVal && timeStr ? dateVal + ' ' + timeStr : '';
    url = API_BASE + '/api/log';
    method = 'POST';
    body = {ml, date: dateStr};
  } else if (modalMode === 'edit') {
    const ml = parseInt(document.getElementById('modal-ml').value) || 0;
    const timeStr = _time24to12str(document.getElementById('modal-time').value);
    const entry = _findBySk(modalSk);
    let newDate = entry ? entry.date : '';
    if (timeStr && newDate) newDate = newDate.split(' ')[0] + ' ' + timeStr;
    url = API_BASE + '/api/log/' + encodeURIComponent(modalSk);
    method = 'PUT';
    body = {ml, text: ml + 'ml @ ' + timeStr, date: newDate};
  } else {
    url = API_BASE + '/api/log/' + encodeURIComponent(modalSk);
    method = 'PUT';
    body = {leftover: document.getElementById('modal-input').value.trim()};
  }
  await fetch(url, {
    method,
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  closeModal();
  await pollState();
  updateLog();
}

async function deleteEntry(sk) {
  if (!confirm('Delete this entry?')) return;
  await fetch(API_BASE + '/api/log/' + encodeURIComponent(sk), {method: 'DELETE'});
  await pollState();
  updateLog();
}

function updateSettings() {
  if (!state.settings) return;
  const cs = state.settings.countdown_secs || 3900;
  document.getElementById('timer-val').textContent =
    cs >= 60 ? Math.floor(cs / 60) + ' min' : cs + ' sec';
  document.getElementById('ss-val').textContent =
    (state.settings.ss_timeout_min || 2) + ' min';
}

function updateCalc() {
  document.getElementById('calc-water').textContent = calcWater;
  const pw = calcWater * (POWDER_PER_60 / 60);
  const side = document.getElementById('calc-powder-side');
  const lbl = document.getElementById('calc-powder-lbl');
  const val = document.getElementById('calc-powder');
  if (calcWater > 0) {
    side.classList.remove('zero');
    lbl.style.color = 'var(--green)';
    val.style.color = 'var(--green)';
    val.textContent = pw.toFixed(1);
  } else {
    side.classList.add('zero');
    lbl.style.color = 'var(--dim)';
    val.style.color = 'var(--dim)';
    val.textContent = '--';
  }
}

function calcAdjust(delta) {
  calcWater = Math.max(0, Math.min(500, calcWater + delta));
  updateCalc();
}

async function calcStart() {
  await fetch(API_BASE + '/api/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ml: calcWater})
  });
  showScreen('main');
  pollState();
}

async function startTimer(ml) {
  await fetch(API_BASE + '/api/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ml: ml})
  });
  pollState();
}

async function adjTimer(dir) {
  const cs = state.settings.countdown_secs || 3900;
  let next;
  if (dir > 0) {
    next = cs < 60 ? Math.min(cs + 10, 60) : Math.min(cs + 300, 10800);
  } else {
    next = cs <= 60 ? Math.max(cs - 10, 10) : Math.max(cs - 300, 60);
  }
  await fetch(API_BASE + '/api/settings', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({countdown_secs: next})
  });
  state.settings.countdown_secs = next;
  updateSettings();
}

function parseGreaterGoodsTimestamp(str) {
  // Parses "Oct 09 2025 12:00:00 AM -05:00" → Date
  const MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const m = str.trim().match(/^(\w{3})\s+(\d{1,2})\s+(\d{4})\s+(\d{1,2}):(\d{2}):(\d{2})\s+(AM|PM)\s+([+-]\d{2}:\d{2})$/);
  if (!m) return null;
  const [,mon,day,year,hr,min,sec,ampm,tz] = m;
  if (!(mon in MONTHS)) return null;
  let h = parseInt(hr);
  if (ampm === 'AM' && h === 12) h = 0;
  else if (ampm === 'PM' && h !== 12) h += 12;
  const mo = String(MONTHS[mon] + 1).padStart(2, '0');
  const d = day.padStart(2, '0');
  const hh = String(h).padStart(2, '0');
  return new Date(`${year}-${mo}-${d}T${hh}:${min}:${sec}${tz}`);
}

function csvCol(cols, idx) {
  return (cols[idx] || '').replace(/^"|"$/g, '').trim();
}
function parseWeightCsv(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  const typeIdx = headers.indexOf('type');
  const tsIdx = headers.indexOf('timestamp');
  const wtIdx = headers.findIndex(h => h.includes('weight') && !h.includes('length'));
  if (typeIdx < 0 || tsIdx < 0 || wtIdx < 0) return [];
  const entries = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (csvCol(cols, typeIdx) !== 'weight') continue;
    const lbs = parseFloat(csvCol(cols, wtIdx));
    if (!lbs || isNaN(lbs)) continue;
    const ts = parseGreaterGoodsTimestamp(csvCol(cols, tsIdx));
    if (!ts || isNaN(ts.getTime())) continue;
    const date = localDateStr(ts);
    const existing = entries.findIndex(e => e.date === date);
    if (existing >= 0) {
      if (ts > new Date(entries[existing]._ts)) entries[existing] = {date, lbs, _ts: ts.toISOString()};
    } else {
      entries.push({date, lbs, _ts: ts.toISOString()});
    }
  }
  return entries.map(({date, lbs}) => ({date, lbs}));
}

function parseEntryDate(e) {
  if (typeof e === 'object' && e.date) {
    // "2026-03-14 02:30 PM" — parse manually for cross-browser support
    const m = e.date.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
    if (m) {
      let h = parseInt(m[4]);
      if (m[6].toUpperCase() === 'PM' && h !== 12) h += 12;
      if (m[6].toUpperCase() === 'AM' && h === 12) h = 0;
      return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]), h, parseInt(m[5]));
    }
    const fallback = new Date(e.date);
    return isNaN(fallback) ? null : fallback;
  }
  // Legacy string entries — no date available, skip
  return null;
}

function entryMl(e) {
  if (typeof e === 'object' && e.ml) return e.ml;
  // Try parsing from text like "60ml @ ..."
  const txt = typeof e === 'string' ? e : (e.text || '');
  const m = txt.match(/^(\d+)ml/);
  return m ? parseInt(m[1]) : 0;
}

function updateTrends() {
  if (!state.mix_log) return;
  const now = new Date();
  let cutoff;
  if (trendRange === 'week') cutoff = new Date(now - 7 * 86400000);
  else if (trendRange === 'month') cutoff = new Date(now - 30 * 86400000);
  else if (trendRange === 'year') cutoff = new Date(now - 365 * 86400000);
  else cutoff = new Date(0);

  // Group by date — track total ml and leftover ml separately
  const dailyTotal = {};
  const dailyLeftover = {};
  let totalMl = 0, count = 0;
  for (const e of state.mix_log) {
    const d = parseEntryDate(e);
    const ml = entryMl(e);
    if (!ml) continue;
    if (d && d < cutoff) continue;
    const key = d ? localDateStr(d) : 'unknown';
    if (key === 'unknown') continue;
    dailyTotal[key] = (dailyTotal[key] || 0) + ml;
    // Parse leftover: "20", "20ml", "50" → number
    const lo = e.leftover ? parseInt(String(e.leftover).replace(/[^0-9]/g, '')) || 0 : 0;
    dailyLeftover[key] = (dailyLeftover[key] || 0) + lo;
    totalMl += ml;
    count++;
  }

  // Fill in missing dates — when weight overlay active, extend range to cover weight dates too
  const labels = [];
  const dataConsumed = [];
  const dataLeftover = [];
  const isoLabels = [];
  const days = Object.keys(dailyTotal).sort();
  const weightByDate = {};
  for (const w of weightData) weightByDate[w.date] = w.lbs;

  // Determine date range: union of consumption dates and (if showWeight) weight dates within cutoff
  let rangeStart = days[0] || null;
  let rangeEnd = days[days.length - 1] || null;
  if (showWeight && weightData.length) {
    const visibleWeightDates = weightData.map(w => w.date).filter(d => !cutoff || new Date(d + 'T00:00:00') >= cutoff);
    if (visibleWeightDates.length) {
      if (!rangeStart || visibleWeightDates[0] < rangeStart) rangeStart = visibleWeightDates[0];
      if (!rangeEnd || visibleWeightDates[visibleWeightDates.length - 1] > rangeEnd) rangeEnd = visibleWeightDates[visibleWeightDates.length - 1];
    }
  }

  if (rangeStart) {
    let cur = new Date(rangeStart + 'T00:00:00');
    const end = new Date(rangeEnd + 'T00:00:00');
    while (cur <= end) {
      const k = localDateStr(cur);
      isoLabels.push(k);
      labels.push(formatChartDateLabel(k));
      const total = dailyTotal[k] || 0;
      const lo = dailyLeftover[k] || 0;
      dataConsumed.push(total - lo);
      dataLeftover.push(lo);
      cur.setDate(cur.getDate() + 1);
    }
  }

  const dataWeight = isoLabels.map(d => weightByDate[d] != null ? weightByDate[d] : null);

  const numDays = Math.max(1, days.length);
  document.getElementById('ts-total').textContent = totalMl;
  document.getElementById('ts-count').textContent = count;
  document.getElementById('ts-avg').textContent = Math.round(totalMl / numDays);

  // Chart
  const ctx = document.getElementById('trends-canvas');
  if (trendChart) trendChart.destroy();

  const datasets = [
    {
      label: 'Consumed',
      data: dataConsumed,
      backgroundColor: 'rgba(90,170,255,0.5)',
      borderColor: 'rgba(90,170,255,0.8)',
      borderWidth: 1,
      borderRadius: {topLeft: 0, topRight: 0, bottomLeft: 6, bottomRight: 6},
      stack: 'ml',
    },{
      label: 'Leftover',
      data: dataLeftover,
      backgroundColor: 'rgba(255,200,55,0.5)',
      borderColor: 'rgba(255,200,55,0.7)',
      borderWidth: 1,
      borderRadius: {topLeft: 6, topRight: 6, bottomLeft: 0, bottomRight: 0},
      stack: 'ml',
    }
  ];
  if (showWeight && weightData.length) {
    datasets.push({
      label: 'Weight (lbs)',
      data: dataWeight,
      type: 'line',
      yAxisID: 'y1',
      borderColor: 'rgba(180,120,255,0.9)',
      backgroundColor: 'rgba(180,120,255,0.15)',
      borderWidth: 2,
      pointRadius: 4,
      pointBackgroundColor: 'rgba(180,120,255,0.9)',
      spanGaps: true,
      tension: 0.3,
    });
  }

  trendChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: datasets,
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {display: true, labels: {color: '#6e6e87', font: {family: 'Outfit', size: 10}, boxWidth: 12, padding: 12}},
        tooltip: {
          backgroundColor: 'rgba(20,20,34,0.95)',
          titleColor: '#ebebf5',
          bodyColor: '#6e6e87',
          borderColor: 'rgba(255,255,255,0.06)',
          borderWidth: 1,
          cornerRadius: 10,
          padding: 12,
          titleFont: {family: 'Outfit', weight: '600'},
          bodyFont: {family: 'Outfit'},
        }
      },
      scales: {
        x: {
          stacked: true,
          ticks: {color: '#4a4a62', font: {size: 10, family: 'Outfit', weight: '500'}, maxRotation: 45},
          grid: {color: 'rgba(255,255,255,0.03)'}
        },
        y: {
          stacked: true,
          beginAtZero: true,
          ticks: {color: '#4a4a62', font: {family: 'Outfit', weight: '500'}, callback: v => v + 'ml'},
          grid: {color: 'rgba(255,255,255,0.03)'}
        },
        y1: showWeight && weightData.length ? {
          type: 'linear',
          position: 'right',
          beginAtZero: false,
          ticks: {color: '#4a4a62', font: {family: 'Outfit', weight: '500'}, callback: v => v + ' lbs'},
          grid: {drawOnChartArea: false},
        } : {display: false},
      }
    }
  });
}

let authState = {registered: false, authenticated: false};

function bufferToBase64url(buf) {
  const bytes = new Uint8Array(buf);
  let s = '';
  bytes.forEach(b => s += String.fromCharCode(b));
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function base64urlToBuffer(b64) {
  const pad = b64.length % 4;
  if (pad) b64 += '='.repeat(4 - pad);
  const s = atob(b64.replace(/-/g, '+').replace(/_/g, '/'));
  const buf = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) buf[i] = s.charCodeAt(i);
  return buf.buffer;
}

async function checkAuth() {
  const overlay = document.getElementById('auth-overlay');
  const sub = document.getElementById('auth-sub');
  const btn = document.getElementById('auth-btn');
  const err = document.getElementById('auth-error');

  try {
    const r = await fetch(API_BASE + '/api/auth/status', {credentials: 'include'});
    authState = await r.json();
  } catch(e) {
    overlay.classList.remove('hidden');
    sub.textContent = 'Cannot reach server';
    return;
  }

  if (authState.authenticated) {
    pollState();
    updateCalc();
    return;
  }

  overlay.classList.remove('hidden');
  if (!authState.registered) {
    sub.textContent = 'Set up Face ID to secure your app';
    btn.textContent = 'Set Up Passkey';
    btn.classList.remove('hidden');
    document.getElementById('auth-name').classList.remove('hidden');
  } else {
    sub.textContent = 'Authenticate to continue';
    btn.textContent = 'Sign In';
    btn.classList.remove('hidden');
    document.getElementById('auth-add-device').style.display = 'flex';
  }
}

async function handleAuth() {
  const btn = document.getElementById('auth-btn');
  const err = document.getElementById('auth-error');
  err.classList.add('hidden');
  btn.disabled = true;
  btn.textContent = 'Please wait...';

  try {
    if (!authState.registered) {
      await doRegister();
    } else {
      await doLogin();
    }
  } catch(e) {
    err.textContent = e.message || 'Authentication failed';
    err.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = authState.registered ? 'Sign In' : 'Set Up Passkey';
  }
}

async function doRegister() {
  const userName = document.getElementById('auth-name').value.trim();
  if (!userName) {
    throw new Error('Please enter your name');
  }

  const r = await fetch(API_BASE + '/api/auth/register-options', {method: 'POST', credentials: 'include'});
  const options = await r.json();

  const pubKeyOptions = {
    challenge: base64urlToBuffer(options.challenge),
    rp: options.rp,
    user: {
      ...options.user,
      id: base64urlToBuffer(options.user.id),
    },
    pubKeyCredParams: options.pubKeyCredParams,
    timeout: options.timeout || 60000,
    attestation: options.attestation || 'none',
    authenticatorSelection: options.authenticatorSelection,
  };
  if (options.excludeCredentials && options.excludeCredentials.length) {
    pubKeyOptions.excludeCredentials = options.excludeCredentials.map(c => ({
      type: c.type, id: base64urlToBuffer(c.id),
    }));
  }

  const credential = await navigator.credentials.create({publicKey: pubKeyOptions});

  const body = {
    id: credential.id,
    rawId: bufferToBase64url(credential.rawId),
    type: credential.type,
    user_name: userName,
    response: {
      attestationObject: bufferToBase64url(credential.response.attestationObject),
      clientDataJSON: bufferToBase64url(credential.response.clientDataJSON),
    },
  };
  if (credential.response.getTransports) {
    body.response.transports = credential.response.getTransports();
  }

  const vr = await fetch(API_BASE + '/api/auth/register-verify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
    credentials: 'include',
  });
  const vd = await vr.json();
  if (!vr.ok) throw new Error(vd.error || 'Registration failed');

  document.getElementById('auth-overlay').classList.add('hidden');
  pollState();
  updateCalc();
}

async function doLogin() {
  const r = await fetch(API_BASE + '/api/auth/login-options', {method: 'POST', credentials: 'include'});

  options.challenge = base64urlToBuffer(options.challenge);
  if (options.allowCredentials) {
    options.allowCredentials = options.allowCredentials.map(c => ({
      ...c, id: base64urlToBuffer(c.id)
    }));
  }

  const assertion = await navigator.credentials.get({publicKey: options});

  const body = {
    id: assertion.id,
    rawId: bufferToBase64url(assertion.rawId),
    type: assertion.type,
    response: {
      authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
      clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
      signature: bufferToBase64url(assertion.response.signature),
    },
  };
  if (assertion.response.userHandle) {
    body.response.userHandle = bufferToBase64url(assertion.response.userHandle);

  const vr = await fetch(API_BASE + '/api/auth/login-verify', {
    method: 'POST',

  updateCalc();
}

        id: base64urlToBuffer(options.user.id),
      },

    };
    if (options.excludeCredentials && options.excludeCredentials.length) {

      }));
    }

    const credential = await navigator.credentials.create({publicKey: pubKeyOptions});

    const body = {

      user_name: name,
      response: {
        attestationObject: bufferToBase64url(credential.response.attestationObject),

      },
    };
    if (credential.response.getTransports) {

    }

    const vr = await fetch(API_BASE + '/api/auth/register-verify', {

// Add credentials:include to all fetch calls for cookie handling
const _origFetch = window.fetch;
window.fetch = function(url, opts) {
  opts = opts || {};
  if (typeof url === 'string' && url.startsWith(API_BASE)) {
    opts.credentials = 'include';
  }
  return _origFetch.call(this, url, opts);
};

// ── Screensaver ─────────────────────────────────
const SS_TIMEOUT = 2 * 60 * 1000; // 2 minutes
let ssActive = false;
let ssLastInput = Date.now();
let ssAnimFrame = null;

// Sprite state: {x, y, dx, dy, el}
const ssSprites = [];

function initScreensaver() {
  const bottle = document.getElementById('ss-bottle');
  const baby = document.getElementById('ss-baby');
  ssSprites.length = 0;
  ssSprites.push({x: 150, y: 100, dx: 1.5, dy: 1.2, el: bottle});
  ssSprites.push({x: 500, y: 250, dx: -1.2, dy: 1.5, el: baby});
}

function enterScreensaver() {
  if (ssActive) return;
  ssActive = true;
  document.getElementById('screensaver').classList.add('active');
  initScreensaver();
  ssAnimate();
}

function exitScreensaver() {
  ssActive = false;
  ssLastInput = Date.now();
  document.getElementById('screensaver').classList.remove('active');
  if (ssAnimFrame) { cancelAnimationFrame(ssAnimFrame); ssAnimFrame = null; }
}

let ssClockLastMove = 0;
let ssClockX = 300, ssClockY = 200;

function ssAnimate() {
  if (!ssActive) return;
  const W = window.innerWidth, H = window.innerHeight;

  // Bounce sprites
  for (const s of ssSprites) {
    s.x += s.dx;
    s.y += s.dy;
    const sw = s.el.offsetWidth || 80;
    const sh = s.el.offsetHeight || 80;
    if (s.x <= 0 || s.x + sw >= W) { s.dx = -s.dx; s.x = Math.max(0, Math.min(s.x, W - sw)); }
    if (s.y <= 0 || s.y + sh >= H) { s.dy = -s.dy; s.y = Math.max(0, Math.min(s.y, H - sh)); }
    s.el.style.left = s.x + 'px';
    s.el.style.top = s.y + 'px';
    s.el.style.transform = s.dx < 0 ? 'scaleX(-1)' : '';
  }

  // Clock — move every 5 minutes
  const now = Date.now();
  if (now - ssClockLastMove > 300000 || ssClockLastMove === 0) {
    ssClockX = 80 + Math.random() * (W - 200);
    ssClockY = 40 + Math.random() * (H - 80);
    ssClockLastMove = now;
  }
  const clockEl = document.getElementById('ss-clock');
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  clockEl.textContent = h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  clockEl.style.left = ssClockX + 'px';
  clockEl.style.top = ssClockY + 'px';

  ssAnimFrame = requestAnimationFrame(ssAnimate);
}

// Track user input for screensaver timeout
['touchstart', 'mousedown', 'keydown'].forEach(evt => {
  document.addEventListener(evt, () => {
    ssLastInput = Date.now();
    if (ssActive) exitScreensaver();
  }, {passive: true});
});

// Check screensaver timeout every 10 seconds
setInterval(() => {
  // Only activate on Pi (kiosk mode) or if enabled
  if (!isPiKiosk) return;
  if (!ssActive && Date.now() - ssLastInput > SS_TIMEOUT) {
    enterScreensaver();
  }
}, 10000);

// Pi kiosk detection — URL has ?pikey= param
const urlParams = new URLSearchParams(window.location.search);
const isPiKiosk = urlParams.has('pikey');

// Zoom is handled via Chromium --force-device-scale-factor flag on Pi

// Pi auth bypass — if pikey matches, skip passkey auth
async function checkPiAuth() {
  const pikey = urlParams.get('pikey');
  if (!pikey) return false;
  try {
    const r = await fetch(API_BASE + '/api/state', {headers: {'X-Api-Key': pikey}});
    if (r.ok) {
      // Override fetch to always include the API key
      const _origFetchPi = window.fetch;
      window.fetch = function(url, opts) {
        opts = opts || {};
        if (typeof url === 'string' && url.startsWith(API_BASE)) {
          opts.headers = opts.headers || {};
          if (opts.headers instanceof Headers) {
            opts.headers.set('X-Api-Key', pikey);
          } else {
            opts.headers['X-Api-Key'] = pikey;
          }
        }
        return _origFetchPi.call(this, url, opts);
      };
      return true;
    }
  } catch(e) {}
  return false;
}

// Initial load — Pi kiosk bypasses passkey auth
(async () => {
  if (isPiKiosk) {
    const ok = await checkPiAuth();
    if (ok) {
      await pollState();
      updateCalc();
      return;
    }
  }
  await checkAuth();
  await pollState();
  const hash = location.hash.replace('#', '');
  if (hash && document.getElementById(hash + '-screen')) {
    showScreen(hash);
  }
  updateCalc();
})();
